<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Bhavishya</title>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; color: white; }
    h1 { margin: 10px; color: #4CAF50; }
    #score { font-size: 24px; margin: 10px; }
    canvas { border: 3px solid #4CAF50; border-radius: 8px; background: #0d0d0d; }
    #controls { margin-top: 15px; text-align: center; }
    button { background: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 6px; cursor: pointer; }
   .instructions { margin-top: 10px; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="controls">
    <button onclick="restartGame()">Restart</button>
    <div class="instructions">Phone: Swipe to move | PC: Arrow keys</div>
  </div>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 1;
    let dy = 0;
    let score = 0;
    let gameRunning = true;
    function drawGame() {
      if (!gameRunning) return;
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { gameOver(); return; }
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
    gameOver(); return;
  }
}
snake.unshift(head);
      if (head.x === food.x && head.y === food.y) { score += 10; scoreEl.textContent = 'Score: ' + score; placeFood(); } else { snake.pop(); }
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#4CAF50';
      for (let part of snake) { ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2); }
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    }
    function placeFood() { food.x = Math.floor(Math.random() * tileCount); food.y = Math.floor(Math.random() * tileCount); }
    function gameOver() { gameRunning = false; ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.fillText('Game Over!', canvas.width/2, canvas.height/2); }
    function restartGame() { snake = [{x: 10, y: 10}]; food = {x: 15, y: 15}; dx = 0; dy = 0; score = 0; scoreEl.textContent = 'Score: 0'; gameRunning = true; }
    document.addEventListener('keydown', e => { if (!gameRunning) return; switch(e.key) { case 'ArrowUp': if (dy === 0) { dx = 0; dy = -1; } break; case 'ArrowDown': if (dy === 0) { dx = 0; dy = 1; } break; case 'ArrowLeft': if (dx === 0) { dx = -1; dy = 0; } break; case 'ArrowRight': if (dx === 0) { dx = 1; dy = 0; } break; } });
    let touchStartX = 0; let touchStartY = 0;
    canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
    canvas.addEventListener('touchend', e => { if (!gameRunning) return; let touchEndX = e.changedTouches[0].clientX; let touchEndY = e.changedTouches[0].clientY; let diffX = touchEndX - touchStartX; let diffY = touchEndY - touchStartY; if (Math.abs(diffX) > Math.abs(diffY)) { if (diffX > 0 && dx === 0) { dx = 1; dy = 0; } else if (diffX < 0 && dx === 0) { dx = -1; dy = 0; } } else { if (diffY > 0 && dy === 0) { dx = 0; dy = 1; } else if (diffY < 0 && dy === 0) { dx = 0; dy = -1; } } });
    setInterval(drawGame, 100); placeFood();
  </script>
</body>
</html>
